global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "apigateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["apigateway:8080"]

  - job_name: "catalog-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["catalog:8080"]

  - job_name: "inventory-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["inventory:8080"]

  - job_name: "order-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["order:8080"]

  - job_name: "postgres-exporter"
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "rabbitmq"
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: "redis-exporter"
    metrics_path: /metrics
    static_configs:
      - targets: ["redis-exporter:9121"]
