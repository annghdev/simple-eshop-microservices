services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: eshop-postgres-dev
    environment:
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/postgres/init/01-create-databases.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - eshop

  redis:
    image: ${REDIS_IMAGE}
    container_name: eshop-redis-dev
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - eshop

  rabbitmq:
    image: ${RABBITMQ_IMAGE}
    container_name: eshop-rabbitmq-dev
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
      - "${RABBITMQ_METRICS_PORT}:15692"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - eshop

  apigateway:
    image: ${APIGATEWAY_IMAGE}
    build:
      context: ..
      dockerfile: src/APIGateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__commondb: Host=postgres;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=commondb
      ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JAEGER_OTLP_ENDPOINT: http://jaeger:4317
      TEMPO_OTLP_ENDPOINT: http://tempo:4319
      LOKI_ENDPOINT: http://loki:3100
    ports:
      - "${APIGATEWAY_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - eshop

  catalog:
    image: ${CATALOG_IMAGE}
    build:
      context: ..
      dockerfile: src/services/Catalog/Catalog.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__catalogdb: Host=postgres;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=catalogdb
      ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JAEGER_OTLP_ENDPOINT: http://jaeger:4317
      TEMPO_OTLP_ENDPOINT: http://tempo:4319
      LOKI_ENDPOINT: http://loki:3100
    ports:
      - "${CATALOG_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - eshop

  inventory:
    image: ${INVENTORY_IMAGE}
    build:
      context: ..
      dockerfile: src/services/Inventory/Inventory.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__catalogdb: Host=postgres;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=catalogdb
      ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JAEGER_OTLP_ENDPOINT: http://jaeger:4317
      TEMPO_OTLP_ENDPOINT: http://tempo:4319
      LOKI_ENDPOINT: http://loki:3100
    ports:
      - "${INVENTORY_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - eshop

  order:
    image: ${ORDER_IMAGE}
    build:
      context: ..
      dockerfile: src/services/Order/Order.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__catalogdb: Host=postgres;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=catalogdb
      ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JAEGER_OTLP_ENDPOINT: http://jaeger:4317
      TEMPO_OTLP_ENDPOINT: http://tempo:4319
      LOKI_ENDPOINT: http://loki:3100
    ports:
      - "${ORDER_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - eshop

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: eshop-prometheus-dev
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - apigateway
      - catalog
      - inventory
      - order
      - postgres-exporter
      - redis-exporter
      - rabbitmq
    restart: unless-stopped
    networks:
      - eshop

  loki:
    image: ${LOKI_IMAGE}
    container_name: eshop-loki-dev
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ../monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    restart: unless-stopped
    networks:
      - eshop

  jaeger:
    image: ${JAEGER_IMAGE}
    container_name: eshop-jaeger-dev
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT}:16686"
      - "${JAEGER_OTLP_GRPC_PORT}:4317"
      - "${JAEGER_OTLP_HTTP_PORT}:4318"
    restart: unless-stopped
    networks:
      - eshop

  tempo:
    image: ${TEMPO_IMAGE}
    container_name: eshop-tempo-dev
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "${TEMPO_PORT}:3200"
      - "${TEMPO_OTLP_GRPC_PORT}:4319"
    volumes:
      - ../monitoring/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped
    networks:
      - eshop

  postgres-exporter:
    image: ${POSTGRES_EXPORTER_IMAGE}
    container_name: eshop-postgres-exporter-dev
    environment:
      DATA_SOURCE_URI: postgres:5432/postgres?sslmode=disable
      DATA_SOURCE_USER: ${POSTGRES_USER}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_EXPORTER_PORT}:9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - eshop

  redis-exporter:
    image: ${REDIS_EXPORTER_IMAGE}
    container_name: eshop-redis-exporter-dev
    command:
      - --redis.addr=redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "${REDIS_EXPORTER_PORT}:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - eshop

  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: eshop-grafana-dev
    depends_on:
      - prometheus
      - loki
      - jaeger
      - tempo
      - postgres-exporter
      - redis-exporter
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    networks:
      - eshop

networks:
  eshop:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
