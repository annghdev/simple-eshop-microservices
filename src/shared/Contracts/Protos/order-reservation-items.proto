syntax = "proto3";

package orderreservationitems.v1;

option csharp_namespace = "Contracts.Protos.OrderReservation";

service OrderReservationItemsGrpc {
  rpc GetItems (GetOrderReservationItemsRequest) returns (GetOrderReservationItemsResponse);
}

message GetOrderReservationItemsRequest {
  string order_id = 1;
}

message GetOrderReservationItemsResponse {
  string order_id = 1;
  int32 reservation_status = 2;
  repeated ReservationItems items = 3;
}

message ReservationItems {
  string inventory_item_id = 1;
  int32 quantity = 2;
}
