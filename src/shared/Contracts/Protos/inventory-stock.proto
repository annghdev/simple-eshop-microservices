syntax = "proto3";

package inventorystock.v1;

option csharp_namespace = "Contracts.Protos.InventoryStocks";

service InventoryStockGrpc {
  rpc GetProductStocks (GetProductStocksRequest) returns (GetProductStocksResponse);
}

message GetProductStocksRequest {
  repeated ProductVariantQuery items = 1;
}

message ProductVariantQuery {
  string product_id = 1;
  string variant_id = 2;
}

message GetProductStocksResponse {
  repeated ProductStock products = 1;
}

message ProductStock {
  string product_id = 1;
  string variant_id = 2;
  repeated ItemStock stock_infos = 3;
}

message ItemStock {
  string item_id = 1;
  int32 available = 2;
  string warehouse_id = 3;
  double warehouse_lat = 4;
  double warehouse_lng = 5;
}
