# Application stack only. Start this before the monitoring stack so network
# eshop-production-net exists, or create the network once: docker network create eshop-production-net
services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: eshop-postgres-prod
    environment:
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/01-create-databases.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - eshop

  redis:
    image: ${REDIS_IMAGE}
    container_name: eshop-redis-prod
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD}",
        "--appendonly",
        "yes",
      ]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - eshop

  rabbitmq:
    image: ${RABBITMQ_IMAGE}
    container_name: eshop-rabbitmq-prod
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
      - "${RABBITMQ_METRICS_PORT}:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - eshop

  apigateway:
    image: ${APIGATEWAY_IMAGE}
    container_name: eshop-apigateway-prod
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ""
      ASPNETCORE_HTTP_PORTS: ""
      ASPNETCORE_HTTPS_PORTS: ""
      ConnectionStrings__authdb: Host=postgres;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=authdb
      ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JAEGER_OTLP_ENDPOINT: ${JAEGER_OTLP_ENDPOINT}
      TEMPO_OTLP_ENDPOINT: ${TEMPO_OTLP_ENDPOINT}
      LOKI_ENDPOINT: ${LOKI_ENDPOINT}
      ReverseProxy__Clusters__catalog-cluster__Destinations__catalog-api__Address: http://catalog:8080
      ReverseProxy__Clusters__inventory-cluster__Destinations__inventory-api__Address: http://inventory:8080
      ReverseProxy__Clusters__order-cluster__Destinations__order-api__Address: http://order:8080
      ReverseProxy__Clusters__payment-cluster__Destinations__payment-api__Address: http://payment:8080
      ReverseProxy__Clusters__shipping-cluster__Destinations__shipping-api__Address: http://shipping:8080
    ports:
      - "${APIGATEWAY_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      payment:
        condition: service_started
      shipping:
        condition: service_started
    restart: unless-stopped
    networks:
      - eshop

  catalog:
    image: ${CATALOG_IMAGE}
    container_name: eshop-catalog-prod
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ""
      ASPNETCORE_HTTP_PORTS: ""
      ASPNETCORE_HTTPS_PORTS: ""
      ConnectionStrings__catalogdb: Host=postgres;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=catalogdb
      ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JAEGER_OTLP_ENDPOINT: ${JAEGER_OTLP_ENDPOINT}
      TEMPO_OTLP_ENDPOINT: ${TEMPO_OTLP_ENDPOINT}
      LOKI_ENDPOINT: ${LOKI_ENDPOINT}
    ports:
      - "${CATALOG_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - eshop

  inventory:
    image: ${INVENTORY_IMAGE}
    container_name: eshop-inventory-prod
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ""
      ASPNETCORE_HTTP_PORTS: ""
      ASPNETCORE_HTTPS_PORTS: ""
      ConnectionStrings__order: http://order:8082
      ConnectionStrings__inventorydb: Host=postgres;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=inventorydb
      ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JAEGER_OTLP_ENDPOINT: ${JAEGER_OTLP_ENDPOINT}
      TEMPO_OTLP_ENDPOINT: ${TEMPO_OTLP_ENDPOINT}
      LOKI_ENDPOINT: ${LOKI_ENDPOINT}
    ports:
      - "${INVENTORY_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - eshop

  order:
    image: ${ORDER_IMAGE}
    container_name: eshop-order-prod
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ""
      ASPNETCORE_HTTP_PORTS: ""
      ASPNETCORE_HTTPS_PORTS: ""
      ConnectionStrings__inventory: http://inventory:8082
      ConnectionStrings__orderdb: Host=postgres;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=orderdb
      ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JAEGER_OTLP_ENDPOINT: ${JAEGER_OTLP_ENDPOINT}
      TEMPO_OTLP_ENDPOINT: ${TEMPO_OTLP_ENDPOINT}
      LOKI_ENDPOINT: ${LOKI_ENDPOINT}
    ports:
      - "${ORDER_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - eshop

  payment:
    image: ${PAYMENT_IMAGE}
    container_name: eshop-payment-prod
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ""
      ASPNETCORE_HTTP_PORTS: ""
      ASPNETCORE_HTTPS_PORTS: ""
      ConnectionStrings__paymentdb: Host=postgres;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=paymentdb
      ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JAEGER_OTLP_ENDPOINT: ${JAEGER_OTLP_ENDPOINT}
      TEMPO_OTLP_ENDPOINT: ${TEMPO_OTLP_ENDPOINT}
      LOKI_ENDPOINT: ${LOKI_ENDPOINT}
    ports:
      - "${PAYMENT_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - eshop

  shipping:
    image: ${SHIPPING_IMAGE}
    container_name: eshop-shipping-prod
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ""
      ASPNETCORE_HTTP_PORTS: ""
      ASPNETCORE_HTTPS_PORTS: ""
      ConnectionStrings__shippingdb: Host=postgres;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=shippingdb
      ConnectionStrings__redis: redis:6379,password=${REDIS_PASSWORD}
      ConnectionStrings__rabbitmq: amqp://${RABBITMQ_USERNAME}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      JAEGER_OTLP_ENDPOINT: ${JAEGER_OTLP_ENDPOINT}
      TEMPO_OTLP_ENDPOINT: ${TEMPO_OTLP_ENDPOINT}
      LOKI_ENDPOINT: ${LOKI_ENDPOINT}
    ports:
      - "${SHIPPING_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - eshop

networks:
  eshop:
    name: ${ESHOP_APP_NETWORK_NAME}
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
